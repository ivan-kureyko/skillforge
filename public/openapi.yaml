openapi: 3.0.3
info:
  title: SkillForge API
  version: 1.0.0
  description: REST API for managing personal learning

servers:
  - url: http://localhost

paths:
  /api/login:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@skillforge.test
                password:
                  type: string
                  example: password
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /api/test-auth:
    get:
      summary: Test protected endpoint
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated successfully
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
